name: 抓取友链RSS生成data.json
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python crawl.py
      - name: 提交更新
        run: |
          git config user.name "FriendLink Bot"
          git config user.email "bot@github.com"
          git add data.json
          git commit -m "自动更新文章数据" || true
          git push
